# Temporary SharpEmu Apple Silicon diagnostic build
name: SharpEmu native arm64 diagnostic

on:
  push:
    branches:
      - main
      - sharpemu-native-arm64-experiment
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    env:
      DOTNET_NOLOGO: true
      SHARPEMU_REF: d8f1a883a1231f1589def35d3cbad46b485fb858
      PUBLISH_DIR: ${{ github.workspace }}/publish
    steps:
      - name: Checkout build harness
        uses: actions/checkout@v4

      - name: Checkout SharpEmu macOS port
        uses: actions/checkout@v4
        with:
          repository: xnetcat/sharpemu
          ref: ${{ env.SHARPEMU_REF }}
          path: sharpemu

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.103

      - name: Patch ARM64 diagnostic CPU boundary
        shell: python
        run: |
          from pathlib import Path

          path = Path("sharpemu/src/SharpEmu.Core/Cpu/CpuDispatcher.cs")
          text = path.read_text(encoding="utf-8")

          using_anchor = "using System.Buffers.Binary;\n"
          if "using System.Runtime.InteropServices;" not in text:
              if using_anchor not in text:
                  raise SystemExit("using anchor was not found")
              text = text.replace(
                  using_anchor,
                  using_anchor + "using System.Runtime.InteropServices;\n",
                  1,
              )

          needle = "        _nativeCpuBackend ??= new DirectExecutionBackend(_moduleManager);"
          replacement = """        if (RuntimeInformation.ProcessArchitecture != Architecture.X64)
                  {
                      var architecture = RuntimeInformation.ProcessArchitecture.ToString();
                      var backendError =
                          $\"Apple Silicon diagnostic build reached guest CPU execution. \" +
                          $\"SharpEmu currently executes PS5 x86-64 instructions directly, and the \" +
                          $\"x86-64 to {architecture} translation backend is not implemented yet.\";
                      LastNotImplementedInfo = new CpuNotImplementedInfo(
                          CpuNotImplementedSource.NativeBackend,
                          entryPoint,
                          nid: null,
                          exportName: \"cpu_engine_arm64_translation_missing\",
                          libraryName: $\"diagnostic-{architecture}\",
                          detail: backendError);
                      LastMilestoneLog = string.Concat(
                          LastMilestoneLog,
                          Environment.NewLine,
                          backendError);
                      Log.Error(backendError);
                      return FailEarly(
                          OrbisGen2Result.ORBIS_GEN2_ERROR_NOT_IMPLEMENTED,
                          CpuExitReason.NativeBackendUnavailable);
                  }

                  _nativeCpuBackend ??= new DirectExecutionBackend(_moduleManager);"""

          if needle not in text:
              raise SystemExit("CpuDispatcher patch point was not found")
          text = text.replace(needle, replacement, 1)
          path.write_text(text, encoding="utf-8")

      - name: Restore ARM64 runtime
        working-directory: sharpemu
        run: >-
          dotnet restore src/SharpEmu.CLI/SharpEmu.CLI.csproj
          -r osx-arm64
          --force-evaluate
          -p:RestoreLockedMode=false

      - name: Publish native Apple Silicon diagnostic build
        working-directory: sharpemu
        run: >-
          dotnet publish src/SharpEmu.CLI/SharpEmu.CLI.csproj
          -c Release
          -r osx-arm64
          --self-contained true
          --no-restore
          -p:PublishDir="$PUBLISH_DIR"

      - name: Stage MoltenVK
        working-directory: sharpemu
        run: scripts/fetch-macos-moltenvk.sh "$PUBLISH_DIR"

      - name: Verify architectures
        run: |
          file "$PUBLISH_DIR/SharpEmu"
          file "$PUBLISH_DIR"/*.dylib || true
          test "$(lipo -archs "$PUBLISH_DIR/SharpEmu")" = "arm64"

      - name: Add diagnostic notes
        run: |
          cat > "$PUBLISH_DIR/APPLE-SILICON-DIAGNOSTIC.txt" <<'EOF'
          SharpEmu experimental native Apple Silicon diagnostic build

          This build runs as a native arm64 macOS process and includes the
          cross-platform host work from SharpEmu pull request 47.

          Expected current limitation:
          PS5 guest programs contain x86-64 instructions. The upstream emulator
          currently executes them directly and has no ARM64 translator. Opening
          a game should stop cleanly at the CPU boundary and write an explicit
          cpu_engine_arm64_translation_missing diagnostic to the log.

          Please report:
          1. macOS version and Mac model
          2. Whether the GUI opens without Rosetta
          3. Output of: file SharpEmu
          4. Terminal output and SharpEmu log after selecting an eboot.bin
          5. Whether Vulkan/MoltenVK or input initialization fails before CPU execution
          EOF

      - name: Archive build
        run: tar -czf sharpemu-osx-arm64-diagnostic.tar.gz -C "$PUBLISH_DIR" .

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: sharpemu-osx-arm64-diagnostic
          path: sharpemu-osx-arm64-diagnostic.tar.gz
          if-no-files-found: error
